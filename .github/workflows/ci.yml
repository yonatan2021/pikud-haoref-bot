# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx tsx --test src/__tests__/*.test.ts

      - name: Run dashboard tests
        env:
          DB_PATH: ':memory:'
        run: npx tsx --test 'src/__tests__/dashboard/**/*.test.ts'

  dashboard-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard-ui/package-lock.json
      - name: Install dashboard dependencies
        run: cd dashboard-ui && npm ci
      - name: Build dashboard
        run: cd dashboard-ui && npm run build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: pikud-haoref-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  wizard-check:
    name: Wizard Type-check & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if wizard exists
        id: check
        run: |
          if [ -f wizard/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js 22
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wizard/package-lock.json

      - name: Install wizard dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd wizard && npm ci

      - name: TypeScript type-check
        if: steps.check.outputs.exists == 'true'
        run: cd wizard && npx tsc --noEmit

      - name: Run wizard tests
        if: steps.check.outputs.exists == 'true'
        run: cd wizard && npm test
