# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: ['**']
  # Only trigger on PR open/reopen — `synchronize` (the event for PR-branch
  # pushes) duplicates the `push` trigger above and was burning ~50% of
  # Actions minutes on every PR push. The `push` trigger already covers
  # PR-branch updates because PRs are just branches with commits.
  pull_request:
    types: [opened, reopened]
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      bot: ${{ steps.changes.outputs.bot }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
      docker: ${{ steps.changes.outputs.docker }}
      wizard: ${{ steps.changes.outputs.wizard }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050  # v3
        id: changes
        with:
          filters: |
            bot:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
            dashboard:
              - 'dashboard-ui/**'
            docker:
              - 'src/**'
              - 'dashboard-ui/**'
              - 'Dockerfile'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
            wizard:
              - 'wizard/**'

  test:
    name: Type-check & Test
    needs: filter
    if: needs.filter.outputs.bot == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx tsx --test --test-concurrency=1 src/__tests__/*.test.ts

      - name: Run dashboard tests
        env:
          DB_PATH: ':memory:'
        run: npx tsx --test 'src/__tests__/dashboard/**/*.test.ts'

  dashboard-build:
    name: dashboard-build
    needs: filter
    if: needs.filter.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard-ui/package-lock.json
      - name: Install dashboard dependencies
        run: cd dashboard-ui && npm ci
      - name: Build dashboard
        run: cd dashboard-ui && npm run build

  docker-build:
    name: Docker Build Validation
    needs: filter
    if: needs.filter.outputs.docker == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build Docker image (validation only, no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: false
          tags: pikud-haoref-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  wizard-check:
    name: Wizard Type-check & Test
    needs: filter
    if: needs.filter.outputs.wizard == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check if wizard exists
        id: check
        run: |
          if [ -f wizard/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js 22
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wizard/package-lock.json

      - name: Install wizard dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd wizard && npm ci

      - name: TypeScript type-check
        if: steps.check.outputs.exists == 'true'
        run: cd wizard && npx tsc --noEmit

      - name: Run wizard tests
        if: steps.check.outputs.exists == 'true'
        run: cd wizard && npm test

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [test, dashboard-build, docker-build, wizard-check]
    if: always()
    steps:
      - name: All checks passed or skipped
        env:
          NEEDS_RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_RESULTS" | jq -e '
            to_entries | all(
              .value.result == "success" or
              .value.result == "skipped"
            )
          ' && echo "All CI jobs passed or were skipped." || {
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          }
