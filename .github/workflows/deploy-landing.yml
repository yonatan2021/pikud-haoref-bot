name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - 'landing/**'
      - 'README.md'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & push to landing repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - name: Build landing page
        run: npm run build:landing
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          ACCESSIBILITY_CONTACT_NAME: ${{ secrets.ACCESSIBILITY_CONTACT_NAME }}
          ACCESSIBILITY_CONTACT_EMAIL: ${{ secrets.ACCESSIBILITY_CONTACT_EMAIL }}

      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LANDING_DEPLOY_KEY }}" > ~/.ssh/landing_deploy_key
          chmod 600 ~/.ssh/landing_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'SSHEOF'
          Host github-landing
            HostName github.com
            IdentityFile ~/.ssh/landing_deploy_key
            StrictHostKeyChecking accept-new
          SSHEOF

      - name: Push dist to landing repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          LANDING_REPO="yonatan2021/pikud-haoref-bot-landing"
          VERSION=$(node -p "require('./package.json').version")

          git clone git@github-landing:${LANDING_REPO}.git /tmp/landing-repo

          # Wipe old content (preserve .git dir), copy fresh dist
          find /tmp/landing-repo -mindepth 1 -not -path '/tmp/landing-repo/.git*' -delete
          cp -r landing/dist/. /tmp/landing-repo/

          cd /tmp/landing-repo
          git add -A

          # Exit cleanly if nothing changed
          if git diff --staged --quiet; then
            echo "No changes to deploy — skipping push"
            exit 0
          fi

          git commit -m "chore: deploy landing page v${VERSION}"
          git push origin main
