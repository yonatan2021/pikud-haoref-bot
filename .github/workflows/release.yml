name: Release

on:
  push:
    tags:
      - 'wizard-v*.*.*'

permissions:
  contents: read

jobs:
  publish-wizard:
    name: Publish wizard to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/wizard-v')

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build wizard
        run: cd wizard && npm ci && npm run build

      - name: Publish wizard
        run: cd wizard && npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
