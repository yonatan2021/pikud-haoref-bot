name: Release

on:
  push:
    tags:
      - 'wizard-v*.*.*'

jobs:
  publish-wizard:
    name: Publish wizard to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/wizard-v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build wizard
        run: cd wizard && npm ci && npm run build

      - name: Publish wizard
        run: cd wizard && npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
