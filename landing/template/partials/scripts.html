  <script>
    // ── 1. Cursor spotlight ─────────────────────────────────────────────────
    document.addEventListener('mousemove', function(e) {
      document.documentElement.style.setProperty('--cursor-x', e.clientX + 'px');
      document.documentElement.style.setProperty('--cursor-y', e.clientY + 'px');
    });

    // ── 2. Scroll reveal (.reveal elements) ─────────────────────────────────
    var revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          revealObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.05 }); /* reduced from 0.1 — prevents tall sections failing to trigger on short mobile viewports */

    document.querySelectorAll('.reveal').forEach(function(el) {
      revealObserver.observe(el);
    });

    // ── 3. Feature cards stagger reveal ─────────────────────────────────────
    var featureObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          featureObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });

    document.querySelectorAll('.feature-card').forEach(function(el, i) {
      // Cap stagger at 300ms — prevents 1.3s wait for last card in a 19-card grid
      el.style.setProperty('--reveal-delay', Math.min(i * 0.07, 0.3) + 's');
      featureObserver.observe(el);
    });

    // ── 4. Count-up animation (stats strip + live counters) ─────────────────
    var countObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (!e.isIntersecting) return;
        var el = e.target;
        var target = parseInt(el.dataset.target);
        if (!target || el.classList.contains('counted')) return;
        el.classList.add('counted');
        var startTime = null;
        var duration = 1400;
        var animate = function(ts) {
          if (!startTime) startTime = ts;
          var progress = Math.min((ts - startTime) / duration, 1);
          var eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = Math.floor(eased * target).toLocaleString('he-IL');
          if (progress < 1) {
            requestAnimationFrame(animate);
          } else {
            el.textContent = target.toLocaleString('he-IL');
            el.classList.add('stat-counted');
            setTimeout(function() { el.classList.remove('stat-counted'); }, 600);
          }
        };
        requestAnimationFrame(animate);
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('[data-target]').forEach(function(el) {
      countObserver.observe(el);
    });

    // ── 5. How It Works — connector line animation on scroll ────────────────
    var howSection = document.querySelector('.how-it-works');
    if (howSection) {
      var howObserver = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) {
          howSection.classList.add('animated');
          howObserver.disconnect();
        }
      }, { threshold: 0.3 });
      howObserver.observe(howSection);
    }

    // ── 6. Mobile: feature tabs, show-more, compact cards ─────────────────
    var isMobile = window.matchMedia('(max-width: 900px)');

    // 6a. Tab switcher for feature panels
    var tabs = document.querySelectorAll('.features-tab');
    var panels = [document.getElementById('panel-user'), document.getElementById('panel-dev')];

    function activateTab(selectedTab) {
      tabs.forEach(function(tab) {
        var isSelected = tab === selectedTab;
        tab.classList.toggle('features-tab--active', isSelected);
        tab.setAttribute('aria-selected', isSelected);
      });
      var activeId = selectedTab.getAttribute('aria-controls');
      panels.forEach(function(panel) {
        if (!panel) return;
        var show = panel.id === activeId;
        panel.hidden = !show;
        panel.style.display = show ? '' : 'none';
      });
    }

    function initMobileTabs() {
      if (isMobile.matches) {
        // On mobile: show only user panel initially
        if (panels[1]) { panels[1].hidden = true; panels[1].style.display = 'none'; }
      } else {
        // On desktop: show both, remove hidden
        panels.forEach(function(p) { if (p) { p.hidden = false; p.style.display = ''; } });
      }
    }

    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() { activateTab(tab); });
    });

    initMobileTabs();
    isMobile.addEventListener('change', initMobileTabs);

    // 6b. "Show more" buttons for feature grids
    document.querySelectorAll('.features-show-more').forEach(function(btn) {
      var grid = btn.previousElementSibling;
      if (!grid || !grid.classList.contains('features-grid')) return;
      var total = grid.querySelectorAll('.feature-card').length;
      var hiddenCount = Math.max(0, total - 6);
      if (hiddenCount > 0) {
        btn.textContent = 'הצג עוד (' + hiddenCount + ')';
      }
      btn.addEventListener('click', function() {
        var expanded = grid.classList.toggle('expanded');
        btn.setAttribute('aria-expanded', expanded);
        btn.textContent = expanded ? 'הצג פחות' : 'הצג עוד (' + hiddenCount + ')';
      });
    });

    // 6c. Compact cards — tap to expand description on mobile
    document.querySelectorAll('.feature-card').forEach(function(card) {
      card.addEventListener('click', function() {
        if (!isMobile.matches) return;
        card.classList.toggle('expanded');
      });
    });

    // 6d. What's New show-more
    var clBtn = document.querySelector('.changelog-show-more');
    if (clBtn) {
      var wnGrid = document.querySelector('.wn-grid');
      clBtn.addEventListener('click', function() {
        if (!wnGrid) return;
        var expanded = wnGrid.classList.toggle('expanded');
        clBtn.setAttribute('aria-expanded', expanded);
        clBtn.textContent = expanded ? 'הצג פחות' : 'עוד עדכונים';
      });
    }

    // 6e. FAB auto-hide near CTA section
    var fab = document.querySelector('.mobile-fab');
    var ctaSection = document.querySelector('.cta-section');
    if (fab && ctaSection) {
      var fabObserver = new IntersectionObserver(function(entries) {
        fab.classList.toggle('mobile-fab--hidden', entries[0].isIntersecting);
      }, { threshold: 0.2 });
      fabObserver.observe(ctaSection);
    }

    // ── 7. Interactive city preview — custom dropdown ────────────────────────
    var cityBubble     = document.getElementById('city-preview-bubble');
    var previewCity    = document.getElementById('preview-city');
    var previewZone    = document.getElementById('preview-zone');
    var previewSeconds = document.getElementById('preview-seconds');
    var previewBar     = document.getElementById('preview-bar');

    function buildBar(seconds) {
      var bar = '';
      for (var b = 0; b < 5; b++) { bar += '🟥'; }
      return bar;
    }

    function showCityPreview(val) {
      if (!val) { if (cityBubble) cityBubble.hidden = true; return; }
      var parts = val.split('|');
      var city = parts[0] || '';
      var zone = parts[1] || '';
      var secs = parseInt(parts[2], 10) || 45;
      if (previewCity)    previewCity.textContent    = city;
      if (previewZone)    previewZone.textContent    = zone;
      if (previewSeconds) previewSeconds.textContent = String(secs);
      if (previewBar)     previewBar.textContent     = buildBar(secs) + ' ▸ ' + zone + ' (1)';
      if (cityBubble) {
        cityBubble.hidden = false;
        cityBubble.classList.add('city-preview-bubble--animate');
        setTimeout(function() { cityBubble.classList.remove('city-preview-bubble--animate'); }, 400);
      }
    }

    var cityDropdown     = document.getElementById('city-dropdown');
    var cityDropdownBtn  = document.getElementById('city-dropdown-btn');
    var cityDropdownList = document.getElementById('city-dropdown-list');
    var cityDropdownVal  = document.getElementById('city-dropdown-value');

    function closeCityDd() { if (cityDropdown) cityDropdown.setAttribute('aria-expanded','false'); }
    function openCityDd()  { if (cityDropdown) cityDropdown.setAttribute('aria-expanded','true');  }

    if (cityDropdownBtn) {
      cityDropdownBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        cityDropdown.getAttribute('aria-expanded') === 'true' ? closeCityDd() : openCityDd();
      });
    }

    if (cityDropdownList) {
      cityDropdownList.querySelectorAll('.city-dropdown-item').forEach(function(item) {
        item.addEventListener('click', function() {
          var val  = item.dataset.value;
          var text = item.textContent.trim();
          if (cityDropdownVal) cityDropdownVal.textContent = val ? text : '— בחר עיר —';
          cityDropdownList.querySelectorAll('.city-dropdown-item').forEach(function(i) {
            i.classList.remove('city-dropdown-item--selected');
            i.setAttribute('aria-selected', 'false');
          });
          item.classList.add('city-dropdown-item--selected');
          item.setAttribute('aria-selected', 'true');
          closeCityDd();
          showCityPreview(val);
        });
      });
    }

    document.addEventListener('click', function(e) {
      if (cityDropdown && !cityDropdown.contains(e.target)) closeCityDd();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && cityDropdown && cityDropdown.getAttribute('aria-expanded') === 'true') {
        closeCityDd();
        if (cityDropdownBtn) cityDropdownBtn.focus();
      }
    });

    // ── Keyboard navigation for city dropdown ────────────────────────────────
    if (cityDropdownBtn) {
      cityDropdownBtn.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openCityDd();
          var firstItem = cityDropdownList
            ? cityDropdownList.querySelector('.city-dropdown-item:not(.city-dropdown-item--placeholder)')
            : null;
          if (firstItem) {
            firstItem.setAttribute('tabindex', '0');
            firstItem.focus();
          }
        }
      });
    }

    if (cityDropdownList) {
      var allItems = Array.from(
        cityDropdownList.querySelectorAll('.city-dropdown-item:not(.city-dropdown-item--placeholder)')
      );
      allItems.forEach(function(item, idx) {
        item.setAttribute('tabindex', '-1');
        item.addEventListener('keydown', function(e) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            var next = allItems[idx + 1];
            if (next) { next.setAttribute('tabindex', '0'); next.focus(); }
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (idx === 0) {
              if (cityDropdownBtn) cityDropdownBtn.focus();
            } else {
              var prev = allItems[idx - 1];
              if (prev) { prev.setAttribute('tabindex', '0'); prev.focus(); }
            }
          } else if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            item.click();
            if (cityDropdownBtn) cityDropdownBtn.focus();
          } else if (e.key === 'Escape') {
            e.preventDefault();
            closeCityDd();
            if (cityDropdownBtn) cityDropdownBtn.focus();
          }
        });
        /* Reset tabindex on blur so only one item is reachable at a time */
        item.addEventListener('blur', function() {
          item.setAttribute('tabindex', '-1');
        });
      });
    }

    // ── 8a. Screenshots — touch pause/resume ─────────────────────────────────
    var screenshotsTrack = document.querySelector('.screenshots-track');
    if (screenshotsTrack) {
      screenshotsTrack.addEventListener('touchstart', function() {
        screenshotsTrack.style.animationPlayState = 'paused';
      }, { passive: true });
      screenshotsTrack.addEventListener('touchend', function() {
        screenshotsTrack.style.animationPlayState = '';
      }, { passive: true });
    }

    // ── 8. FAQ chat bubbles ───────────────────────────────────────────────────
    document.querySelectorAll('.faq-item').forEach(function(item) {
      var btn = item.querySelector('.faq-q');
      var ans = item.querySelector('.faq-a');
      if (!btn || !ans) return;
      btn.addEventListener('click', function() {
        var isOpen = btn.getAttribute('aria-expanded') === 'true';
        // Close all others
        document.querySelectorAll('.faq-item').forEach(function(other) {
          var ob = other.querySelector('.faq-q');
          var oa = other.querySelector('.faq-a');
          if (ob && oa && other !== item) {
            ob.setAttribute('aria-expanded', 'false');
            ob.classList.remove('faq-q--open');
            oa.setAttribute('aria-hidden', 'true');
            oa.style.maxHeight = '';
            oa.style.opacity = '';
          }
        });
        // Toggle this one
        var opening = !isOpen;
        btn.setAttribute('aria-expanded', String(opening));
        btn.classList.toggle('faq-q--open', opening);
        ans.setAttribute('aria-hidden', String(!opening));
        if (opening) {
          ans.style.maxHeight = ans.scrollHeight + 'px';
          ans.style.opacity = '1';
        } else {
          ans.style.maxHeight = '';
          ans.style.opacity = '';
        }
      });
    });

    // ── 9. Command palette ────────────────────────────────────────────────────
    var cmdOverlay = document.getElementById('cmd-overlay');
    var cmdInput   = document.getElementById('cmd-input');
    var cmdList    = document.getElementById('cmd-list');
    var cmdClose   = document.getElementById('cmd-close');
    var cmdTrigger = document.getElementById('cmd-trigger');

    function openCmdPalette() {
      if (!cmdOverlay) return;
      cmdOverlay.hidden = false;
      filterCmdItems('');
      setTimeout(function() { if (cmdInput) cmdInput.focus(); }, 50);
    }

    function closeCmdPalette() {
      if (!cmdOverlay) return;
      cmdOverlay.hidden = true;
      if (cmdInput) cmdInput.value = '';
      setCmdActive(null);
    }

    function filterCmdItems(query) {
      if (!cmdList) return;
      var items = cmdList.querySelectorAll('.cmd-item');
      var q = query.replace(/^\//, '').toLowerCase();
      items.forEach(function(item) {
        var cmd = (item.dataset.cmd || '').toLowerCase();
        var desc = (item.querySelector('.cmd-desc') || {}).textContent || '';
        item.style.display = (!q || cmd.includes(q) || desc.includes(q)) ? '' : 'none';
      });
      // Auto-select first visible
      var first = cmdList.querySelector('.cmd-item:not([style*="none"])');
      setCmdActive(first || null);
    }

    var activeCmd = null;
    function setCmdActive(el) {
      if (activeCmd) activeCmd.classList.remove('cmd-item--active');
      activeCmd = el;
      if (activeCmd) activeCmd.classList.add('cmd-item--active');
    }

    function activateCmd(el) {
      if (!el) return;
      closeCmdPalette();
      var target = el.dataset.target;
      var href   = el.dataset.href;
      var isExternal = el.dataset.external === 'true';
      if (target) {
        var section = document.querySelector(target);
        if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else if (href) {
        if (isExternal) {
          window.open(href, '_blank', 'noopener,noreferrer');
        } else {
          window.location.href = href;
        }
      }
    }

    if (cmdInput) {
      cmdInput.addEventListener('input', function() { filterCmdItems(cmdInput.value); });
      cmdInput.addEventListener('keydown', function(e) {
        var items = Array.prototype.slice.call(
          cmdList ? cmdList.querySelectorAll('.cmd-item:not([style*="none"])') : []
        );
        var idx = items.indexOf(activeCmd);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          setCmdActive(items[Math.min(idx + 1, items.length - 1)]);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setCmdActive(items[Math.max(idx - 1, 0)]);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          activateCmd(activeCmd);
        } else if (e.key === 'Escape') {
          closeCmdPalette();
        }
      });
    }

    if (cmdList) {
      cmdList.querySelectorAll('.cmd-item').forEach(function(item) {
        item.addEventListener('mouseenter', function() { setCmdActive(item); });
        item.addEventListener('click', function() { activateCmd(item); });
      });
    }

    if (cmdClose)   { cmdClose.addEventListener('click', closeCmdPalette); }
    if (cmdTrigger) { cmdTrigger.addEventListener('click', openCmdPalette); }

    if (cmdOverlay) {
      cmdOverlay.addEventListener('click', function(e) {
        if (e.target === cmdOverlay) closeCmdPalette();
      });
    }

    // "/" key opens palette (not when inside an input/textarea/select)
    document.addEventListener('keydown', function(e) {
      if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        openCmdPalette();
      }
      if (e.key === 'Escape' && cmdOverlay && !cmdOverlay.hidden) {
        closeCmdPalette();
      }
    });

    // ── 11. Copy-to-clipboard (npx command) ──────────────────────────────────
    document.querySelectorAll('.copy-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var text = btn.dataset.copy;
        var apply = function() {
          btn.classList.add('copied');
          setTimeout(function() { btn.classList.remove('copied'); }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(apply).catch(function(err) {
            console.warn('[copy-btn] Clipboard API write failed:', err);
          });
        } else {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;opacity:0;';
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy');
            apply();
          } catch(err) {
            console.warn('[copy-btn] execCommand copy failed:', err);
          }
          document.body.removeChild(ta);
        }
      });
    });
  </script>

</body>
</html>
